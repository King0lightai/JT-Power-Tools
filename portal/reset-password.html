<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — JT Power Tools</title>
  <link rel="icon" type="image/png" href="https://jtpowertools.com/favicon.png">
  <link rel="stylesheet" href="css/portal.css">
</head>
<body>
  <div class="page-wrapper">
    <div class="page-center">
      <div class="auth-card">
        <div class="logo">
          <h1>JT <span>Power Tools</span></h1>
          <p>Set a new password</p>
        </div>

        <div id="alert" class="alert"></div>

        <div id="formView">
          <form id="resetForm">
            <div class="form-group">
              <label for="password">New Password</label>
              <input type="password" id="password" name="password" placeholder="Min 8 characters" required minlength="8" autocomplete="new-password">
            </div>
            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Type it again" required minlength="8" autocomplete="new-password">
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">
              <span class="btn-text">Reset Password</span>
              <span class="loading-text"><span class="spinner"></span> Resetting...</span>
            </button>
          </form>
        </div>

        <div id="successView" class="hidden" style="text-align: center;">
          <div style="font-size: 48px; margin-bottom: 16px;">✅</div>
          <h2>Password Reset</h2>
          <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 20px;">
            Your password has been changed. Sign in with your new password.
          </p>
          <a href="/" class="btn btn-primary">Sign In</a>
        </div>

        <div id="errorView" class="hidden" style="text-align: center;">
          <div style="font-size: 48px; margin-bottom: 16px;">⚠️</div>
          <h2>Invalid Link</h2>
          <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 20px;">
            This reset link is invalid or has expired. Request a new one.
          </p>
          <a href="forgot-password.html" class="btn btn-secondary">Request New Link</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('resetForm');
    const btn = document.getElementById('submitBtn');
    const alertEl = document.getElementById('alert');

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    // No token in URL — show error
    if (!token) {
      document.getElementById('formView').classList.add('hidden');
      document.getElementById('errorView').classList.remove('hidden');
    }

    function showAlert(msg, type = 'error') {
      alertEl.textContent = msg;
      alertEl.className = `alert alert-${type} show`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        showAlert('Passwords do not match');
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;
      alertEl.classList.remove('show');

      try {
        const response = await fetch(
          'https://jobtread-mcp-server.king0light-ai.workers.dev/auth/reset',
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, newPassword: password }),
          }
        );

        const data = await response.json();

        if (!response.ok) {
          if (response.status === 400 && data.error?.includes('expired')) {
            document.getElementById('formView').classList.add('hidden');
            document.getElementById('errorView').classList.remove('hidden');
          } else {
            showAlert(data.error || 'Reset failed');
          }
          return;
        }

        document.getElementById('formView').classList.add('hidden');
        document.getElementById('successView').classList.remove('hidden');
      } catch (err) {
        showAlert('Something went wrong. Please try again.');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
