<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — JT Power Tools</title>
  <link rel="icon" type="image/png" href="https://jtpowertools.com/favicon.png">
  <link rel="stylesheet" href="css/portal.css">
</head>
<body>
  <div class="page-wrapper">
    <div class="page-center">
      <div class="auth-card">
        <div class="logo">
          <h1>JT <span>Power Tools</span></h1>
          <p id="subtitle">Create your account</p>
        </div>

        <!-- Invite banner (shown when ?invite= is present) -->
        <div id="inviteBanner" class="hidden" style="background: var(--brand-glow); border: 1px solid var(--brand); border-radius: var(--radius-sm); padding: 16px; text-align: center; margin-bottom: 20px;">
          <p style="color: var(--brand); font-weight: 700; font-size: 15px;">You've been invited to join</p>
          <p id="inviteOrgName" style="font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; color: var(--text-primary); margin-top: 4px;"></p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="registerForm" autocomplete="on">
          <!-- License key (hidden for invite flow) -->
          <div id="licenseGroup" class="form-group">
            <label for="licenseKey">License Key</label>
            <input type="text" id="licenseKey" name="licenseKey" placeholder="From your Gumroad purchase" autocomplete="off">
            <div class="hint">The key you received when you bought JT Power Tools</div>
          </div>

          <!-- Grant key (optional, shown for direct registration) -->
          <div id="grantKeyGroup" class="form-group">
            <label for="grantKey">Grant Key <span style="color: var(--text-dim);">(optional)</span></label>
            <input type="text" id="grantKey" name="grantKey" placeholder="From JT Power Tools extension" autocomplete="off">
            <div class="hint">Power Users: enter your JobTread grant key to connect your org</div>
          </div>

          <div class="form-group">
            <label for="displayName">Display Name</label>
            <input type="text" id="displayName" name="displayName" placeholder="How your team sees you" required autocomplete="name" maxlength="50">
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email">
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Min 8 characters" required autocomplete="new-password" minlength="8">
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Type it again" required autocomplete="new-password" minlength="8">
          </div>

          <button type="submit" class="btn btn-primary" id="submitBtn">
            <span class="btn-text">Create Account</span>
            <span class="loading-text"><span class="spinner"></span> Creating account...</span>
          </button>
        </form>

        <div class="auth-footer">
          <p>Already have an account? <a href="/">Sign in</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    auth.redirectIfLoggedIn();

    const form = document.getElementById('registerForm');
    const btn = document.getElementById('submitBtn');
    const alertEl = document.getElementById('alert');

    // Check for invite token in URL
    const params = new URLSearchParams(window.location.search);
    const inviteToken = params.get('invite');
    let inviteData = null;

    function showAlert(msg, type = 'error') {
      alertEl.textContent = msg;
      alertEl.className = `alert alert-${type} show`;
    }

    async function loadInvite() {
      if (!inviteToken) return;

      try {
        const response = await fetch(
          `https://jobtread-mcp-server.king0light-ai.workers.dev/invite/${inviteToken}`
        );
        const data = await response.json();

        if (!response.ok) {
          showAlert(data.error || 'Invalid invite link');
          return;
        }

        inviteData = data;

        // Show invite banner, hide license/grant key fields
        document.getElementById('inviteBanner').classList.remove('hidden');
        document.getElementById('inviteOrgName').textContent = data.orgName || 'an organization';
        document.getElementById('licenseGroup').classList.add('hidden');
        document.getElementById('grantKeyGroup').classList.add('hidden');
        document.getElementById('subtitle').textContent = 'Accept your invite';

        // Pre-fill email if invite is email-specific
        if (data.email) {
          const emailInput = document.getElementById('email');
          emailInput.value = data.email;
          emailInput.readOnly = true;
          emailInput.style.opacity = '0.7';
        }
      } catch (err) {
        showAlert('Could not validate invite link');
      }
    }

    loadInvite();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        showAlert('Passwords do not match');
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;
      alertEl.classList.remove('show');

      const fields = {
        email: document.getElementById('email').value,
        password,
        displayName: document.getElementById('displayName').value,
      };

      if (inviteToken) {
        fields.inviteToken = inviteToken;
      } else {
        const licenseKey = document.getElementById('licenseKey').value.trim();
        if (!licenseKey) {
          showAlert('License key is required');
          btn.classList.remove('loading');
          btn.disabled = false;
          return;
        }
        fields.licenseKey = licenseKey;

        const grantKey = document.getElementById('grantKey').value.trim();
        if (grantKey) fields.grantKey = grantKey;
      }

      try {
        await auth.register(fields);
        window.location.href = '/dashboard.html';
      } catch (err) {
        showAlert(err.message || 'Registration failed. Please try again.');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
