<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — JT Power Tools</title>
  <link rel="icon" type="image/png" href="https://jtpowertools.com/favicon.png">
  <link rel="stylesheet" href="css/portal.css">
</head>
<body>
  <div class="page-wrapper">
    <div class="page-center">
      <div class="auth-card">
        <div class="logo">
          <h1>JT <span>Power Tools</span></h1>
          <p>Reset your password</p>
        </div>

        <div id="alert" class="alert"></div>

        <div id="formView">
          <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 20px; text-align: center;">
            Enter your email and we'll send you a link to reset your password.
          </p>

          <form id="forgotForm">
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email">
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">
              <span class="btn-text">Send Reset Link</span>
              <span class="loading-text"><span class="spinner"></span> Sending...</span>
            </button>
          </form>
        </div>

        <div id="sentView" class="hidden" style="text-align: center;">
          <div style="font-size: 48px; margin-bottom: 16px;">📧</div>
          <h2>Check Your Email</h2>
          <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 20px;">
            If an account exists with that email, we've sent a password reset link. It expires in 1 hour.
          </p>
          <a href="/" class="btn btn-secondary">Back to Sign In</a>
        </div>

        <div class="auth-footer">
          <p>Remember your password? <a href="/">Sign in</a></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('forgotForm');
    const btn = document.getElementById('submitBtn');
    const alertEl = document.getElementById('alert');

    function showAlert(msg, type = 'error') {
      alertEl.textContent = msg;
      alertEl.className = `alert alert-${type} show`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const response = await fetch(
          'https://jobtread-mcp-server.king0light-ai.workers.dev/auth/forgot',
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: document.getElementById('email').value }),
          }
        );

        // Always show success (anti-enumeration)
        document.getElementById('formView').classList.add('hidden');
        document.getElementById('sentView').classList.remove('hidden');
      } catch (err) {
        showAlert('Something went wrong. Please try again.');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
